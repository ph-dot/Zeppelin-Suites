<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../output.css" rel="stylesheet">
    <title>Zeppelin Suites - Sign Up Page</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');
    *{
        font-family: "Geist", sans-serif;
    }
    </style>
</head>
<body>
<nav class="bg-white px-6 md:px-16 lg:px-24 xl:px-32 py-4 flex items-center justify-between relative">
    <a href="../pages/index.html">
        <img src="../images/zeppelin-logo.png" alt="Zeppelin Suites Logo" style="height:75px;">
    </a>
    <!-- Desktop Nav Items -->
    <div class="hidden md:flex items-center gap-8">
        <div class="relative group">
            <button class="flex items-center gap-1.5 text-sm text-zinc-800 cursor-pointer bg-transparent border-0 py-2">
                Browse Units
                <svg id="desktopChevron" class="transition-transform group-hover:rotate-180" width="10" height="6" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="m1 1 4 4 4-4" stroke="#71717b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="absolute top-full left-0 mt-1 w-44 bg-white border border-zinc-200 rounded-xl shadow-lg py-2 z-50 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all">
                <a href="../pages/studioTypeA.html" class="block px-4 py-2 text-sm text-zinc-600 hover:bg-zinc-50">Studio Type A</a>
                <a href="../pages/studioTypeB.html" class="block px-4 py-2 text-sm text-zinc-600 hover:bg-zinc-50">Studio Type B</a>
                <a href="../pages/oneBedroom.html" class="block px-4 py-2 text-sm text-zinc-600 hover:bg-zinc-50">One Bedroom</a>
                <a href="../pages/twoBedroom.html" class="block px-4 py-2 text-sm text-zinc-600 hover:bg-zinc-50">Two Bedroom</a>
            </div>
        </div>
        <a href="../pages/faq.html" class="text-sm text-zinc-500 hover:text-zinc-800">FAQ</a>
        <a href="../pages/aboutUs.html" class="text-sm text-zinc-500 hover:text-zinc-800">About Us</a>
        <a href="../pages/contact.html" class="text-sm text-zinc-500 hover:text-zinc-800">Contact</a>
        <a href="../pages/login.html" class="text-sm text-zinc-500 hover:text-zinc-800">Portal</a>
    </div>

    <!-- Hamburger -->
    <button onclick="toggleMenu()" class="md:hidden flex flex-col gap-1.5 cursor-pointer bg-transparent border-0 p-1">
        <span id="bar1" class="block w-6 h-0.5 bg-zinc-800 transition-transform"></span>
        <span id="bar2" class="block w-6 h-0.5 bg-zinc-800 transition-opacity"></span>
        <span id="bar3" class="block w-6 h-0.5 bg-zinc-800 transition-transform"></span>
    </button>

    <!-- Mobile Menu -->
    <div id="mobileMenu" class="absolute top-full left-0 w-full bg-white border-t border-zinc-200 flex-col p-5 gap-1 md:hidden z-50 hidden">
        <button onclick="toggleDropdown('mobileDropdown', 'mobileChevron')" class="flex items-center justify-between w-full px-4 py-2.5 rounded-lg text-sm text-zinc-800 hover:bg-zinc-50 bg-transparent border-0 cursor-pointer">
            Browse Units
            <svg id="mobileChevron" class="transition-transform" width="10" height="6" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="m1 1 4 4 4-4" stroke="#71717b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div id="mobileDropdown" class="hidden flex-col pl-4">
            <a href="../pages/studioTypeA.html" class="px-4 py-2 rounded-lg text-sm text-zinc-500 hover:bg-zinc-50">Studio Type A</a>
            <a href="../pages/studioTypeB.html" class="px-4 py-2 rounded-lg text-sm text-zinc-500 hover:bg-zinc-50">Studio Type B</a>
            <a href="../pages/oneBedroom.html" class="px-4 py-2 rounded-lg text-sm text-zinc-500 hover:bg-zinc-50">One Bedroom</a>
            <a href="../pages/twoBedroom.html" class="px-4 py-2 rounded-lg text-sm text-zinc-500 hover:bg-zinc-50">Two Bedroom</a>
        </div>
        <a href="../pages/faq.html" class="px-4 py-2.5 rounded-lg text-sm text-zinc-500 hover:bg-zinc-50">FAQ</a>
        <a href="../pages/aboutUs.html" class="px-4 py-2.5 rounded-lg text-sm text-zinc-500 hover:bg-zinc-50">About Us</a>
        <a href="../pages/contact.html" class="px-4 py-2.5 rounded-lg text-sm text-zinc-500 hover:bg-zinc-50">Contact</a>
        <a href="../pages/login.html" class="px-4 py-2.5 rounded-lg text-sm text-zinc-500 hover:bg-zinc-50">Portal</a>
        
    </div>
</nav>

<div class="flex h-[700px] w-full">
    <div class="w-full hidden md:inline-block">
        <img class="h-full bg-center bg-cover bg-no-repeat" src="../images/zeppelin-suites-slider-exterior-2.jpg" alt="leftSideImage">
    </div>

    <div class="w-full flex flex-col items-center justify-center">

        <form class="md:w-96 w-80 flex flex-col items-center justify-center">
            <h2 class="text-4xl text-gray-900 font-medium">Sign Up</h2>
            <p class="text-sm text-gray-500/90 mt-3">Welcome! Please sign up to continue</p>

            <button type="button" class="w-full mt-8 bg-gray-500/10 flex items-center justify-center h-12 rounded-full">
                <img src="https://raw.githubusercontent.com/prebuiltui/prebuiltui/main/assets/login/googleLogo.svg" alt="googleLogo">
            </button>

            <div class="flex items-center gap-4 w-full my-5">
                <div class="w-full h-px bg-gray-300/90"></div>
                <p class="w-full text-nowrap text-sm text-gray-500/90">or sign up with email</p>
                <div class="w-full h-px bg-gray-300/90"></div>
            </div>

            <div class="flex items-center w-full bg-transparent border border-gray-300/60 h-12 rounded-full overflow-hidden pl-6 gap-2">
                <svg width="16" height="11" viewBox="0 0 16 11" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M0 .55.571 0H15.43l.57.55v9.9l-.571.55H.57L0 10.45zm1.143 1.138V9.9h13.714V1.69l-6.503 4.8h-.697zM13.749 1.1H2.25L8 5.356z" fill="#6B7280"/>
                </svg>
                <input type="email" placeholder="Email id" class="bg-transparent text-gray-500/80 placeholder-gray-500/80 outline-none text-sm w-full h-full" required>                 
            </div>

            <div class="flex items-center mt-6 w-full bg-transparent border border-gray-300/60 h-12 rounded-full overflow-hidden pl-6 gap-2">
                <svg width="13" height="17" viewBox="0 0 13 17" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13 8.5c0-.938-.729-1.7-1.625-1.7h-.812V4.25C10.563 1.907 8.74 0 6.5 0S2.438 1.907 2.438 4.25V6.8h-.813C.729 6.8 0 7.562 0 8.5v6.8c0 .938.729 1.7 1.625 1.7h9.75c.896 0 1.625-.762 1.625-1.7zM4.063 4.25c0-1.406 1.093-2.55 2.437-2.55s2.438 1.144 2.438 2.55V6.8H4.061z" fill="#6B7280"/>
                </svg>
                <input type="password" placeholder="Password" class="bg-transparent text-gray-500/80 placeholder-gray-500/80 outline-none text-sm w-full h-full" required>
            </div>

            <div class="flex items-center mt-6 w-full bg-transparent border border-gray-300/60 h-12 rounded-full overflow-hidden pl-6 gap-2">
                <svg width="13" height="17" viewBox="0 0 13 17" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13 8.5c0-.938-.729-1.7-1.625-1.7h-.812V4.25C10.563 1.907 8.74 0 6.5 0S2.438 1.907 2.438 4.25V6.8h-.813C.729 6.8 0 7.562 0 8.5v6.8c0 .938.729 1.7 1.625 1.7h9.75c.896 0 1.625-.762 1.625-1.7zM4.063 4.25c0-1.406 1.093-2.55 2.437-2.55s2.438 1.144 2.438 2.55V6.8H4.061z" fill="#6B7280"/>
                </svg>
                <input type="password" placeholder="Re-enter Password" class="bg-transparent text-gray-500/80 placeholder-gray-500/80 outline-none text-sm w-full h-full" required>
            </div>

            <div class="w-full flex items-center justify-between mt-8 text-gray-500/80">
                <div class="flex items-center gap-2">
                    <input class="h-5" type="checkbox" id="checkbox">
                    <label class="text-sm" for="checkbox">Remember me</label>
                </div>
            </div>

            <button type="submit" class="mt-8 w-full h-11 rounded-full text-white bg-indigo-500 hover:opacity-90 transition-opacity">
                Sign Up
            </button>
            <p class="text-gray-500/90 text-sm mt-4">Already have an account? <a class="text-black hover:underline" href="../pages/login.html">Sign in</a></p>
        </form>
    </div>
</div>

<script>
    let menuOpen = false;

    function toggleMenu() {
        menuOpen = !menuOpen;
        const menu = document.getElementById('mobileMenu');
        const bar1 = document.getElementById('bar1');
        const bar2 = document.getElementById('bar2');
        const bar3 = document.getElementById('bar3');

        menu.classList.toggle('hidden', !menuOpen);
        menu.classList.toggle('flex', menuOpen);
        bar1.style.transform = menuOpen ? 'translateY(8px) rotate(45deg)' : '';
        bar2.style.opacity = menuOpen ? '0' : '1';
        bar3.style.transform = menuOpen ? 'translateY(-8px) rotate(-45deg)' : '';
    }

    function toggleDropdown(dropdownId, chevronId) {
        const dropdown = document.getElementById(dropdownId);
        const chevron = document.getElementById(chevronId);
        const isHidden = dropdown.classList.contains('hidden');

        dropdown.classList.toggle('hidden', !isHidden);
        dropdown.classList.toggle('flex', isHidden);
        chevron.style.transform = isHidden ? 'rotate(180deg)' : '';
    }
</script>
</body>
</html>
